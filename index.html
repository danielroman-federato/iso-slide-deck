document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

tem. Ingest multi-state deliveries, resolve editions, layer carrier deviations, adopt incoming circulars — and prove every bureau rule survives, traced, through to a bound policy.<\u002Fp>\n    <\u002Fdiv>\n    <div>\n      <div style=\"height:1px;background:rgba(242,234,222,0.12);margin-bottom:24px;\"><\u002Fdiv>\n      <div style=\"display:flex;gap:10px;flex-wrap:wrap;font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:0.14em;color:#BCA897;\">\n        <span class=\"c21\">INGEST<\u002Fspan>\n        <span class=\"c21\">EDITIONS<\u002Fspan>\n        <span class=\"c21\">CIRCULARS<\u002Fspan>\n        <span class=\"c21\">DEVIATIONS<\u002Fspan>\n        <span class=\"c21\">CONTENT<\u002Fspan>\n        <span class=\"c21\">ALGORITHM<\u002Fspan>\n        <span class=\"c21\">QUOTE<\u002Fspan>\n        <span class=\"c21\">BIND<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ══════════════════ INTRO GRID ══════════════════ -->\n  <section data-label=\"Intro Grid\" data-speaker-notes=\"The full picture before we walk through the screens. Eleven capability areas, who uses each one, and what it actually changes in day-to-day work. The first four are the bureau content foundation — you cannot rate without them. Customer configuration and quoting follow as the customer-facing layer. Bureau continuity and deviations come next, then operational tooling. Full circular management is a stretch goal for launch.\" style=\"box-sizing:border-box;background:#35231F;color:#F2EADE;font-family:'Schibsted Grotesk',sans-serif;padding:56px 84px;display:flex;flex-direction:column;\">\n\n    <div style=\"display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px;\">\n      <div>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:14px;letter-spacing:0.18em;color:#20DFA6;font-weight:500;margin-bottom:10px;\">THE FULL PICTURE<\u002Fdiv>\n        <h2 style=\"font-size:44px;font-weight:700;letter-spacing:-0.025em;l 0.22);border-radius:999px;padding:2px 8px;\">Compliance<\u002Fspan><\u002Fdiv>\n        <span style=\"font-size:15px;color:#C9B6A6;line-height:1.3;\">Carrier form substitutions filed, versioned, and enforced systematically<\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(242,234,222,0.07);\">\n        <div style=\"display:flex;align-items:center;gap:10px;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:600;color:#20DFA6;background:rgba(32,223,166,0.12);border-radius:4px;padding:2px 7px;flex:none;\">09<\u002Fspan><span style=\"font-size:17px;font-weight:600;\">Rates Deviation Enablement<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:6px;flex-wrap:wrap;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;color:#20DFA6;background:rgba(32,223,166,0.1);border:1px solid rgba(32,223,166,0.22);border-radius:999px;padding:2px 8px;\">Actuaries<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;color:#20DFA6;background:rgba(32,223,166,0.1);border:1px solid rgba(32,223,166,0.22);border-radius:999px;padding:2px 8px;\">Product<\u002Fspan><\u002Fdiv>\n        <span style=\"font-size:15px;color:#C9B6A6;line-height:1.3;\">LCMs and tier factors layer on top of bureau rates without code changes<\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(242,234,222,0.07);\">\n        <div style=\"display:flex;align-items:center;gap:10px;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:600;color:#20DFA6;background:rgba(32,223,166,0.12);border-radius:4px;padding:2px 7px;flex:none;\">10<\u002Fspan><span style=\"font-size:17px;font-weight:600;\">Data Browser<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:6px;flex-wrap:wrap;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;color:#20DFA6;background:rgba(32,223,166,0.1);border:1px solid rgba(32,223,166,0.22);border-radius:999px;padding:2px 8px;\">Actuaries<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;color:#20DFA6;background:rgba(32,223,166,0.1);border:1px solid rgba(32,223,166,0.22);border-radius:999px;padding:2px 8px;\">Ops<\u002Fspan><\u002Fdiv>\n        <span style=\"font-size:15px;color:#C9B6A6;line-height:1.3;\">Inspect any rate table, territory crosswalk, or form — in real time<\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;align-items:center;gap:10px;padding:9px 0;opacity:0.55;\">\n        <div style=\"display:flex;align-items:center;gap:10px;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:600;color:#A08B79;border:1px dashed rgba(160,139,121,0.5);border-radius:4px;padding:2px 7px;flex:none;\">★<\u002Fspan><span style=\"font-size:17px;font-weight:600;color:#C9B6A6;\">Full Circular Management<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:0.12em;color:#A08B79;background:rgba(255,255,255,0.05);border:1px dashed rgba(160,139,121,0.35);border-radius:999px;padding:2px 9px;white-space:nowrap;\">STRETCH<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:6px;flex-wrap:wrap;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;color:#A08B79;background:rgba(255,255,255,0.05);border:1px solid rgba(160,139,121,0.25);border-radius:999px;padding:2px 8px;\">Product<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;color:#A08B79;background:rgba(255,255,255,0.05);border:1px solid rgba(160,139,121,0.25);border-radius:999px;padding:2px 8px;\">Compliance<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;color:#A08B79;background:rgba(255,255,255,0.05);border:1px solid rgba(160,139,121,0.25);border-radius:999px;padding:2px 8px;\">Forms Counsel<\u002Fspan><\u002Fdiv>\n        <span style=\"font-size:15px;color:#A08B79;line-height:1.3;\">Multi-role sign-off, impact estimates, deadline calendar — steady-state bureau lifecycle<\u002Fspan>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n\n    <div style=\"display:flex;justify-content:space-between;align-items:center;margin-top:12px;font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:0.12em;color:#B0A498;\">\n      <span>FEDERATO · ISO ERC 2.0<\u002Fspan><span>BUILD ROADMAP<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ══════════════════ AGENDA ══════════════════ -->\n  <section data-label=\"Walkthrough\" data-speaker-notes=\"The map: eight screens across seven stages of ERC integration. Ingest the bureau delivery, onboard the customer (carrier or MGA), calibrate deviations against the algorithm view, inspect the loaded content, run quote-to-bind grounded in bureau rules, then enforce the ISO licensing gate that sits underneath everything, and finally adopt incoming circulars.\" style=\"box-sizing:border-box;background:#F4F0E8;color:#35231F;font-family:'Schibsted Grotesk',sans-serif;padding:72px 88px;display:flex;flex-direction:column;\">\n    <div style=\"display:flex;justify-content:space-between;align-items:flex-end;\">\n      <div>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:14px;letter-spacing:0.16em;color:#8A5634;font-weight:500;margin-bottom:12px;\">THE WALKTHROUGH<\u002Fdiv>\n        <h2 style=\"font-size:52px;font-weight:700;letter-spacing:-0.025em;line-height:1;\">Seven stages of ERC integration<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:0.1em;color:#A2978C;text-align:right;\">RAW ISO DELIVERY<br>→ BOUND POLICY<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"height:3px;width:64px;background:#20DFA6;border-radius:2px;margin:22px 0 30px;\"><\u002Fdiv>\n    <div style=\"flex:1;display:flex;flex-direction:column;gap:14px;min-height:0;\">\n\n      <div class=\"c39\">\n        <div style=\"width:210px;flex:none;\"><div class=\"c26\">INGEST<\u002Fdiv><div class=\"c34\">Bureau delivery<\u002Fdiv><\u002Fdiv>\n        <div class=\"c41\">\n          <div class=\"c16\"><div class=\"c29\"><span class=\"c33\">Ops Dashboard<\u002Fspan><\u002Fdiv><div class=\"c31\">Load ISO ERC deliveries into Federato's shared bureau content library<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"c45\"><\u002Fdiv>\n      <div class=\"c39\">\n        <div style=\"width:210px;flex:none;\"><div class=\"c26\">CUSTOMER INTEGRATION<\u002Fdiv><div class=\"c34\">Onboarding<\u002Fdiv><\u002Fdiv>\n        <div class=\"c41\">\n          <div class=\"c16\"><div class=\"c29\"><span class=\"c33\">Customer Workspace<\u002Fspan><\u002Fdiv><div class=\"c31\">Onboard a customer (carrier or MGA) and scope every action to them<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"c45\"><\u002Fdiv>\n      <div class=\"c39\">\n        <div style=\"width:210px;flex:none;\"><div class=\"c26\">DEVIATIONS<\u002Fdiv><div class=\"c34\">Calibration<\u002Fdiv><\u002Fdiv>\n        <div class=\"c41\">\n          <div class=\"c16\"><div class=\"c29\"><span class=\"c33\">Deviation Manager<\u002Fspan><\u002Fdiv><div class=\"c31\">Manage proprietary form substitutions and rate overlays<\u002Fdiv><\u002Fdiv>\n          <div class=\"c16\"><div class=\"c29\"><span class=\"c33\">Algorithm View<\u002Fspan><\u002Fdiv><div class=\"c31\">View and lightly edit the ordered rating algorithm<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"c45\"><\u002Fdiv>\n      <div class=\"c39\">\n        <div style=\"width:210px;flex:none;\"><div class=\"c26\">CONTENT<\u002Fdiv><div class=\"c34\">Inspection<\u002Fdiv><\u002Fdiv>\n        <div class=\"c41\">\n          <div class=\"c16\"><div class=\"c29\"><span class=\"c33\">Data Browser<\u002Fspan><\u002Fdiv><div class=\"c31\">Inspect the loaded bureau content driving every quote<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"c45\"><\u002Fdiv>\n      <div class=\"c39\">\n        <div style=\"width:210px;flex:none;\"><div class=\"c26\">QUOTE → BIND<\u002Fdiv><div class=\"c34\">Bureau content in production<\u002Fdiv><\u002Fdiv>\n        <div class=\"c41\">\n          <div class=\"c16\"><div class=\"c29\"><span class=\"c33\">Bureau-grounded issuance<\u002Fspan><\u002Fdiv><div class=\"c31\">Every premium, attached form and bound record traceable to the bureau rule that drove it<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"c45\"><\u002Fdiv>\n      <div class=\"c39\">\n        <div style=\"width:210px;flex:none;\"><div class=\"c26\">LICENSING<\u002Fdiv><div class=\"c34\">Content gate<\u002Fdiv><\u002Fdiv>\n        <div class=\"c41\">\n          <div class=\"c16\"><div class=\"c29\"><span class=\"c33\">ISO Permissions<\u002Fspan><\u002Fdiv><div class=\"c31\">ISO Content Licensing Agreement plus per-carrier LOB × service × jurisdiction licensing gate<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"c45\"><\u002Fdiv>\n      <div class=\"c39\">\n        <div style=\"width:210px;flex:none;\"><div class=\"c26\">CIRCULARS<\u002Fdiv><div class=\"c34\">Adoption<\u002Fdiv><\u002Fdiv>\n        <div class=\"c41\">\n          <div class=\"c16\"><div class=\"c29\"><span class=\"c33\">Circular Adoption<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.16em;font-weight:600;color:#0a8a64;background:rgba(32,223,166,0.16);border:1px solid rgba(32,223,166,0.4);border-radius:999px;padding:3px 8px;margin-left:8px;\">STRETCH<\u002Fspan><\u002Fdiv><div class=\"c31\">Track, sign off and adopt incoming ISO circulars across stakeholder roles<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ══════════════════ SCREEN 01 ══════════════════ -->\n  <section data-label=\"Ops Dashboard\" data-speaker-notes=\"Ingest is where Federato builds its shared ERC content library — the asset every downstream carrier onboarding subscribes to. Mass ingest with streaming status and STC validation makes each delivery's load repeatable and trustworthy instead of a manual, opaque process.\" class=\"c6\">\n    <div class=\"c22\">\n      <div>\n        <h2 class=\"c20\">Ops Dashboard<\u002Fh2>\n      <\u002Fdiv>\n      <span class=\"c1\">INGEST<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"c9\">\n      <div class=\"c19\">\n        <div class=\"c3\">BUILT FOR<\u002Fdiv>\n        <div class=\"c28\">\n          <div class=\"c2\"><span class=\"c13\">●<\u002Fspan>Implementation engineers loading a fresh ISO ERC delivery<\u002Fdiv>\n          <div class=\"c2\"><span class=\"c13\">●<\u002Fspan>Data-operations teams running bureau update pipelines<\u002Fdiv>\n          <div class=\"c2\"><span class=\"c13\">●<\u002Fspan>Actuaries &amp; PMs validating rates and factors are correct<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"c23\">\n        <div class=\"c3\">THE PROBLEM<\u002Fdiv>\n        <p style=\"font-size:18.5px;line-height:1.46;color:#3A2C24;\">ISO delivers rate content state by state. Federato builds a shared library of ingested ERC content — rates, factors, territory definitions, rules, forms and bureau test cases — that every carrier onboarding draws from. Done manually it is error-prone and non-repeatable; done as a managed library it is the asset every downstream stage of integration depends on.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"c4\">\n        <div class=\"c24\">WHAT THE PROTOTYPE DOES<\u002Fdiv>\n        <div class=\"c32\">\n          <div class=\"c14\"><span class=\"c0\"><\u002Fspan><div><span class=\"c7\">Mass ingest UI<\u002Fspan> — point at a bureau delivery and see what is loadable before committing<\u002Fdiv><\u002Fdiv>\n          <div class=\"c14\"><span class=\"c0\"><\u002Fspan><div><span class=\"c7\">Live per-state progress<\u002Fspan> — each delivery's status is visible as it loads, not buried in logs<\u002Fdiv><\u002Fdiv>\n          <div class=\"c14\"><span class=\"c0\"><\u002Fspan><div><span class=\"c7\">Per-delivery outcomes<\u002Fspan> — what loaded, what failed, what was skipped, with the reasons surfaced<\u002Fdiv><\u002Fdiv>\n          <div class=\"c14\"><span class=\"c0\"><\u002Fspan><div><span class=\"c7\">Bureau correctness check<\u002Fspan> — the bureau's own test cases run against the loaded content; pass/fail at a glance<\u002Fdiv><\u002Fdiv>\n          <div class=\"c14\"><span class=\"c0\"><\u002Fspan><div><span class=\"c7\">Active edition view<\u002Fspan> — what is live in each state and when it became effective<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"c15\">\n        <div class=\"c25\">WHAT THIS MEANS IN PRACTICE<\u002Fdiv>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:0.18em;color:#A96F47;font-weight:600;margin-bottom:8px;\">INITIAL ONBOARDING<\u002Fdiv>\n        <div class=\"c27\">\n          <div class=\"c2\"><span class=\"c12\">→<\u002Fspan><div><span class=\"c5\">A multi-day database wrestle becomes a one-screen workflow<\u002Fspan> — implementation engineers stop firefighting bureau deliveries<\u002Fdiv><\u002Fdiv>\n          <div class=\"c2\"><span class=\"c12\">→<\u002Fspan><div><span class=\"c5\">New customers onboard against a validated library<\u002Fspan> — not a fresh from-scratch load every time<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:0.18em;color:#A96F47;font-weight:600;margin:14px 0 8px;\">LONG-TERM MANAGEMENT<\u002Fdiv>\n        <div class=\"c27\">\n          <div class=\"c2\"><span class=\"c12\">→<\u002Fspan><div><span class=\"c5\">One library serves every customer<\u002Fspan> — no per-tenant duplication, no drift between customers<\u002Fdiv><\u002Fdiv>\n          <div class=\"c2\"><span class=\"c12\">→<\u002Fspan><div><span class=\"c5\">Edition refreshes are routine<\u002Fspan> — anyone sees what is live in each state and as of when, without writing a query<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"c8\">\n      <span>FEDERATO · ISO ERC 2.0<\u002Fspan><span>PROTOTYPE WALKTHROUGH<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ══════════════════ CUSTOMER WORKSPACE ══════════════════ -->\n  <section data-label=\"Customer Workspace\" data-speaker-notes=\"Customer Integration is the hub where the customer (carrier or MGA) manages their integration into the platform: onboarding wizard for new customers, retrofit path for legacy ones, and the scoping layer that lets every preceding screen be multi-tenant. In production this plugs into Product Studio — paper companies are managed at the product level, with product definitions and per-product paper-company assignments flowing in from Product Studio.\" class=\"c6\">\n    <div class=\"c22\">\n      <div>\n        <h2 class=\"c20\">Customer Workspace<\u002Fh2>\n      <\u002Fdiv>\n      <span class=\"c1\">CUSTOMER INTEGRATION<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"c9\">\n      <div class=\"c19\">\n        <div class=\"c3\">BUILT FOR<\u002Fdiv>\n        <div class=\"c28\">\n          <div class=\"c2\"><span class=\"c13\">●<\u002Fspan>Implementation engineers onboarding a new customer (carrier or MGA)<\u002Fdiv>\n          <div class=\"c2\"><span class=\"c13\">●<\u002Fspan>Platform administrators running multi-customer deployments<\u002Fdiv>\n          <div class=\"c2\"><span class=\"c13\">●<\u002Fspan>Product managers scoping states &amp; Countrywide editions<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"c23\">\n        <div class=\"c3\">THE PROBLEM<\u002Fdiv>\n        <p style=\"font-size:18.5px;line-height:1.48;color:#3A2C24;\">Every downstream action — deviation overrides, quote issuance, edition selection — must be scoped not just to the customer (carrier or MGA) but to the specific <em>paper company<\u002Fem> writing the policy, for a specific product. Customers operate multiple paper companies, each with its own product mix, state footprint and filings. Without a hub where customers manage their integration, those scopes get hardcoded, state activation lives in spreadsheets, and a new paper company means code changes.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"c4\">\n        <div class=\"c44\">WHAT THE PROTOTYPE DOES<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:11px;font-size:18.5px;line-height:1.4;color:#6E5F54;\">\n          <div class=\"c14\"><span class=\"c11\"><\u002Fspan><div><span class=\"c7\">Carrier list view<\u002Fspan> — every carrier with its onboarding status and the bureau content it is subscribed to<\u002Fdiv><\u002Fdiv>\n          <div class=\"c14\"><span class=\"c11\"><\u002Fspan><div><span class=\"c7\">Onboarding wizard<\u002Fspan> — guided flow for setting up a new carrier and subscribing it to bureau content<\u002Fdiv><\u002Fdiv>\n          <div class=\"c14\"><span class=\"c11\"><\u002Fspan><div><span class=\"c7\">Retrofit path<\u002Fspan> — legacy carriers imported via a reduced flow that preserves existing rate data<\u002Fdiv><\u002Fdiv>\n          <div class=\"c14\"><span class=\"c11\"><\u002Fspan><div><span class=\"c7\">Active-carrier scoping<\u002Fspan> — the active carrier is always visible; switching it scopes the whole session<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"c15\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:0.14em;color:#A2978C;margin-bottom:15px;\">WHAT THIS MEANS IN PRACTICE<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:10px;font-size:17.5px;line-height:1.38;color:#7C6E62;\">\n          <div class=\"c2\"><span class=\"c12\">→<\u002Fspan><div><span class=\"c5\">Customers onboard themselves into the platform<\u002Fspan> — structured guidance instead of a months-long custom engagement<\u002Fdiv><\u002Fdiv>\n          <div class=\"c2\"><span class=\"c12\">→<\u002Fspan><div><span class=\"c5\">A new paper company spins up against existing product definitions<\u002Fspan> — no code changes, no engineering work<\u002Fdiv><\u002Fdiv>\n          <div class=\"c2\"><span class=\"c12\">→<\u002Fspan><div><span class=\"c5\">Multi-customer deployments scale<\u002Fspan> — engineering stops being the bottleneck for new customers, new states, new products<\u002Fdiv><\u002Fdiv>\n          <div class=\"c2\"><span class=\"c12\">→<\u002Fspan><div><span class=\"c5\">Every action is correctly scoped<\u002Fspan> — the platform always knows which customer, paper company and product is active<\u002Fdiv><\u002Fdiv>\n          <div class=\"c2\"><span class=\"c12\">→<\u002Fspan><div><span class=\"c5\">Product launches become configuration changes<\u002Fspan> — not engineering projects<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"c8\">\n      <span>FEDERATO · ISO ERC 2.0<\u002Fspan><span>PROTOTYPE WALKTHROUGH<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ══════════════════ SCREEN 02 ══════════════════ -->\n  <section data-label=\"Deviation Manager\" data-speaker-notes=\"Deviations is the general capability to override bureau content — forms AND rates. The primary use case is proprietary form substitution: carriers swap ISO base forms and endorsements for their own, per state and subline. Rate overlays (LCMs, fees, schedule mods, tier factors) ride the same governance framework — same approval flow, same audit, same scoping — and rate deviations resolve to overlay steps in the algorithm view so the step trace shows them firing.\" class=\"c6\">\n    <div class=\"c22\">\n      <div>\n        <h2 class=\"c20\">Deviation Manager<\u002Fh2>\n      <\u002Fdiv>\n      <span class=\"c1\">DEVIATIONS<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"c9\">\n      <div class=\"c19\">\n        <div class=\"c3\">BUILT FOR<\u002Fdiv>\n        <div class=\"c40\">\n          <div class=\"c2\"><span class=\"c13\">●<\u002Fspan>Actuaries defining and calibrating carrier deviations<\u002Fdiv>\n          <div class=\"c2\"><span class=\"c13\">●<\u002Fspan>Product managers reviewing and approving submissions<\u002Fdiv>\n          <div class=\"c2\"><span class=\"c13\">●<\u002Fspan>Compliance officers tracking filed-vs-active deviations<\u002Fdiv>\n          <div class=\"c2\"><span class=\"c13\">●<\u002Fspan>Underwriting managers seeing the live pricing and forms levers<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"c23\">\n        <div class=\"c3\">THE PROBLEM<\u002Fdiv>\n        <p style=\"font-size:18px;line-height:1.44;color:#3A2C24;\">Carriers rarely use bureau content unchanged. The most consequential departure is <em>forms<\u002Fem> — proprietary carrier forms replacing ISO base forms and endorsements, per state and subline. Rate departures layer on the same governance: LCMs, fees, schedule and tier factors, eligibility overrides. The hard part is not any single override — it is having one governed place to manage <em>any<\u002Fem> deviation (form or rate), see what is actually live versus filed, and trace it through to the issued policy with a record of who approved what.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"c4\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:0.14em;color:#8A5634;font-weight:600;margin-bottom:12px;\">WHAT THE PROTOTYPE DOES<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:8px;font-size:17px;line-height:1.32;color:#6E5F54;\">\n          <div class=\"c14\"><span class=\"c0\"><\u002Fspan><div><span class=\"c7\">Proprietary form substitution (primary use case)<\u002Fspan> — replace any ISO base form or endorsement with a carrier-proprietary form, scoped by state and subline; the bound policy reflects the override automatically<\u002Fdiv><\u002Fdiv>\n          <div class=\"c14\"><span class=\"c0\"><\u002Fspan><div><span class=\"c7\">Rate deviations on the same rails<\u002Fspan> — LCMs, fees, schedule mods, tier factors and algorithm overrides resolve to overlay steps in the rating algorithm and show up in the step trace<\u002Fdiv><\u002Fdiv>\n          <div class=\"c14\"><span class=\"c0\"><\u002Fspan><div><span class=\"c7\">One governed framework for any departure<\u002Fspan> — form substitutions and rate overlays are instances of one mechanism: same approval flow, same audit, same per-carrier scoping<\u002Fdiv><\u002Fdiv>\n          <div class=\"c14\"><span class=\"c0\"><\u002Fspan><div><span class=\"c7\">Per-state, per-subline scoping<\u002Fspan> — every deviation applies to chosen states and sublines; the matrix shows what carries which value<\u002Fdiv><\u002Fdiv>\n          <div class=\"c14\"><span class=\"c0\"><\u002Fspan><div><span class=\"c7\">Approval workflow &amp; bulk fill<\u002Fspan> — drafts move through a configurable review cycle with stalled items flagged; apply one value across a state row or column<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"c15\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:0.14em;color:#A2978C;margin-bottom:12px;\">WHAT THIS MEANS IN PRACTICE<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:8px;font-size:16.5px;line-height:1.32;color:#7C6E62;\">\n          <div class=\"c2\"><span class=\"c12\">→<\u002Fspan><div><span class=\"c5\">Actuaries stop maintaining shadow spreadsheets<\u002Fspan> — \"what we filed vs. what is live\" is one source of truth<\u002Fdiv><\u002Fdiv>\n          <div class=\"c2\"><span class=\"c12\">→<\u002Fspan><div><span class=\"c5\">Customers run their proprietary forms confidently<\u002Fspan> — the forms that differentiate them, without rebuilding the engine<\u002Fdiv><\u002Fdiv>\n          <div class=\"c2\"><span class=\"c12\">→<\u002Fspan><div><span class=\"c5\">Filing teams track every pending deviation against its regulatory deadline<\u002Fspan> — in one place, not in calendars and inboxes<\u002Fdiv><\u002Fdiv>\n          <div class=\"c2\"><span class=\"c12\">→<\u002Fspan><div><span class=\"c5\">A new deviation goes from spec to live in days, not quarters<\u002Fspan> — same governance, faster cycle<\u002Fdiv><\u002Fdiv>\n          <div class=\"c2\"><span class=\"c12\">→<\u002Fspan><div><span class=\"c5\">Examiners get clear answers<\u002Fspan> — what changed, when, who approved, what filing it ties to<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"c8\">\n      <span>FEDERATO · ISO ERC 2.0<\u002Fspan><span>PROTOTYPE WALKTHROUGH<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ══════════════════ SCREEN 08 ══════════════════ -->\n  <section data-label=\"Algorithm View\" data-speaker-notes=\"The algorithm itself, made visible. An ordered sequence of locked bureau steps with a light edit mode for carrier overlays — insert a step at the right position without disrupting the immutable base.\" class=\"c6\">\n    <div class=\"c22\">\n      <div>\n        <h2 class=\"c20\">Algorithm View<\u002Fh2>\n      <\u002Fdiv>\n      <span class=\"c1\">ALGORITHM<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"c9\">\n      <div class=\"c19\">\n        <div class=\"c3\">BUILT FOR<\u002Fdiv>\n        <div class=\"c28\">\n          <div class=\"c2\"><span class=\"c13\">●<\u002Fspan>Actuaries reviewing the step-by-step rating algorithm<\u002Fdiv>\n          <div class=\"c2\"><span class=\"c13\">●<\u002Fspan>Engineers adding a carrier-specific overlay step<\u002Fdiv>\n          <div class=\"c2\"><span class=\"c13\">●<\u002Fspan>PMs confirming the bureau sequence matches the ISO manual<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"c23\">\n        <div class=\"c3\">THE PROBLEM<\u002Fdiv>\n        <p class=\"c42\">The rating algorithm is a long ordered sequence of steps with strict bureau-defined ordering. Adding a carrier-specific overlay means inserting at exactly the right position without disrupting the bureau base. Without a visual view, actuaries can't verify bureau correctness, and the algorithm is opaque to anyone not reading code.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"c4\">\n        <div class=\"c24\">WHAT THE PROTOTYPE DOES<\u002Fdiv>\n        <div class=\"c32\">\n          <div class=\"c14\"><span class=\"c0\"><\u002Fspan><div><span class=\"c7\">Step-by-step rendering<\u002Fspan> — the canonical algorithm as an ordered list of labeled steps<\u002Fdiv><\u002Fdiv>\n          <div class=\"c14\"><span class=\"c0\"><\u002Fspan><div><span class=\"c7\">Overlay-state indicator<\u002Fspan> — carrier overlay steps visually distinguished from the bureau base<\u002Fdiv><\u002Fdiv>\n          <div class=\"c14\"><span class=\"c0\"><\u002Fspan><div><span class=\"c7\">State and edition selector<\u002Fspan> — view the algorithm as it resolves for any specific state and edition<\u002Fdiv><\u002Fdiv>\n          <div class=\"c14\"><span class=\"c0\"><\u002Fspan><div><span class=\"c7\">Light edit mode<\u002Fspan> — enable, disable or insert overlay steps without touching the bureau base<\u002Fdiv><\u002Fdiv>\n          <div class=\"c14\"><span class=\"c0\"><\u002Fspan><div><span class=\"c7\">Locked-step protection<\u002Fspan> — bureau base steps stay immutable; overlays are saved per carrier<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"c15\">\n        <div class=\"c25\">WHAT THIS MEANS IN PRACTICE<\u002Fdiv>\n        <div class=\"c27\">\n          <div class=\"c2\"><span class=\"c12\">→<\u002Fspan><div><span class=\"c5\">Actuaries read and verify the algorithm without reading code<\u002Fspan> — bureau correctness becomes auditable, not a black box<\u002Fdiv><\u002Fdiv>\n          <div class=\"c2\"><span class=\"c12\">→<\u002Fspan><div><span class=\"c5\">Customer-specific overlays are visible insertions<\u002Fspan> — not hidden code branches that only engineers can find<\u002Fdiv><\u002Fdiv>\n          <div class=\"c2\"><span class=\"c12\">→<\u002Fspan><div><span class=\"c5\">Insertion errors are caught before any policy is rated<\u002Fspan> — ordering rules enforced by the system<\u002Fdiv><\u002Fdiv>\n          <div class=\"c2\"><span class=\"c12\">→<\u002Fspan><div><span class=\"c5\">Customers test a new overlay against their historical book<\u002Fspan> — before turning it on against new business<\u002Fdiv><\u002Fdiv>\n          <div class=\"c2\"><span class=\"c12\">→<\u002Fspan><div><span class=\"c5\">The same overlay system extends to every line<\u002Fspan> — the customer writes, the platform supports<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"c8\">\n      <span>FEDERATO · ISO ERC 2.0<\u002Fspan><span>PROTOTYPE WALKTHROUGH<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ══════════════════ SCREEN 06 ══════════════════ -->\n  <section data-label=\"Data Browser\" data-speaker-notes=\"When a quote rates wrong, the first question is 'is the right rate in the database?' This gives non-engineers an operational interface to inspect the bureau content driving rates, including a 52-state map check.\" class=\"c6\">\n    <div class=\"c22\">\n      <div>\n        <h2 class=\"c20\">Data Browser<\u002Fh2>\n      <\u002Fdiv>\n      <span class=\"c1\">CONTENT<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"c9\">\n      <div class=\"c19\">\n        <div class=\"c3\">BUILT FOR<\u002Fdiv>\n        <div class=\"c40\">\n          <div class=\"c2\"><span class=\"c13\">●<\u002Fspan>Actuaries validating loaded rates, factors &amp; territories<\u002Fdiv>\n          <div class=\"c2\"><span class=\"c13\">●<\u002Fspan>Engineers debugging a rating discrepancy in the tables<\u002Fdiv>\n          <div class=\"c2\"><span class=\"c13\">●<\u002Fspan>Product managers reviewing content coverage<\u002Fdiv>\n          <div class=\"c2\"><span class=\"c13\">●<\u002Fspan>Data analysts extracting reference data for models<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"c23\">\n        <div class=\"c3\">THE PROBLEM<\u002Fdiv>\n        <p style=\"font-size:18.5px;line-height:1.48;color:#3A2C24;\">The engine is only as accurate as its tables — and the question “is the right rate loaded?” needs an answer anyone on the team can find. The Data Browser is that source of truth: one operational view of what rate, what factor, which territory, which edition is live in each state and as of when. Actuaries, underwriters, compliance, and implementation teams answer their own questions in seconds, with the same authoritative read.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"c4\">\n        <div class=\"c44\">WHAT THE PROTOTYPE DOES<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:12px;font-size:18px;line-height:1.4;color:#6E5F54;\">\n          <div class=\"c14\"><span class=\"c11\"><\u002Fspan><div><span class=\"c7\">Browse every loaded table<\u002Fspan> — rates, factors, territories, class lookups and editions in one structured view<\u002Fdiv><\u002Fdiv>\n          <div class=\"c14\"><span class=\"c11\"><\u002Fspan><div><span class=\"c7\">State and edition filters<\u002Fspan> — answer \"what loaded for this class in this state under this edition?\" without writing a query<\u002Fdiv><\u002Fdiv>\n          <div class=\"c14\"><span class=\"c11\"><\u002Fspan><div><span class=\"c7\">Geographic completeness check<\u002Fspan> — a map view shows which states have active editions at a glance<\u002Fdiv><\u002Fdiv>\n          <div class=\"c14\"><span class=\"c11\"><\u002Fspan><div><span class=\"c7\">Pending content visibility<\u002Fspan> — approved deliveries that are waiting to activate, surfaced from circular adoption<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"c15\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:0.14em;color:#A2978C;margin-bottom:15px;\">WHAT THIS MEANS IN PRACTICE<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:10px;font-size:17px;line-height:1.34;color:#7C6E62;\">\n          <div class=\"c2\"><span class=\"c12\">→<\u002Fspan><div><span class=\"c5\">Actuaries and compliance answer their own questions<\u002Fspan> — no engineering ticket required to interrogate bureau content<\u002Fdiv><\u002Fdiv>\n          <div class=\"c2\"><span class=\"c12\">→<\u002Fspan><div><span class=\"c5\">Unexpected quotes are debugged in minutes, not days<\u002Fspan> — every value traceable to its source<\u002Fdiv><\u002Fdiv>\n          <div class=\"c2\"><span class=\"c12\">→<\u002Fspan><div><span class=\"c5\">Edition rollovers no longer surprise anyone<\u002Fspan> — what changed between editions is visible at a glance<\u002Fdiv><\u002Fdiv>\n          <div class=\"c2\"><span class=\"c12\">→<\u002Fspan><div><span class=\"c5\">Regulators get answers without engineers writing custom queries<\u002Fspan> — exam responses go from days to minutes<\u002Fdiv><\u002Fdiv>\n          <div class=\"c2\"><span class=\"c12\">→<\u002Fspan><div><span class=\"c5\">Onboarding teams verify content before going live<\u002Fspan> — not after a real quote rates wrong<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"c8\">\n      <span>FEDERATO · ISO ERC 2.0<\u002Fspan><span>PROTOTYPE WALKTHROUGH<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ══════════════════ QUOTE → BIND ══════════════════ -->\n  <section data-label=\"Quote → Bind\" data-speaker-notes=\"Quote-to-bind is already core Federato territory. The integration question is not 'can we run quote-to-bind?' — it is 'when ISO ERC is the base, can we prove every premium is bureau-correct, every form attached for a bureau-defined reason, and every bound policy auditable to the circular that authorized it?' This slide is about what the ERC integration enables at the issuance layer — bureau-grounded rating, bureau-driven form attachment, and regulator-ready bind records — not about quote, rate or policy UI as new product.\" class=\"c6\">\n    <div class=\"c22\">\n      <div>\n        <div class=\"c10\">QUOTE → BIND<\u002Fdiv>\n        <h2 class=\"c20\">Bureau-grounded issuance<\u002Fh2>\n      <\u002Fdiv>\n      <span class=\"c1\">BUREAU CONTENT IN PRODUCTION<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"c9\">\n      <div class=\"c19\">\n        <div class=\"c3\">BUILT FOR<\u002Fdiv>\n        <div class=\"c28\">\n          <div class=\"c2\"><span class=\"c13\">●<\u002Fspan>Compliance officers ensuring bureau-correct issuance<\u002Fdiv>\n          <div class=\"c2\"><span class=\"c13\">●<\u002Fspan>Underwriters defending a price and a form list<\u002Fdiv>\n          <div class=\"c2\"><span class=\"c13\">●<\u002Fspan>Actuaries verifying the engine matches the bureau manual<\u002Fdiv>\n          <div class=\"c2\"><span class=\"c13\">●<\u002Fspan>Regulators auditing rates, deviations and bound policies<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"c23\">\n        <div class=\"c3\">WHY THIS MATTERS<\u002Fdiv>\n        <p style=\"font-size:18px;line-height:1.46;color:#3A2C24;\">Quote-to-bind is already core Federato territory. The integration question is not <em>can we run quote-to-bind<\u002Fem> — it is whether, with ISO ERC as the base, every premium, every attached form and every bound record can be defended back to the bureau rule that drove it. Compliant implementation means the workflow the carrier already runs is now grounded in bureau-correct content end to end, with deviations explicit and circulars traceable.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"c4\">\n        <div class=\"c44\">WHAT THE INTEGRATION ENABLES<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:8px;font-size:17px;line-height:1.32;color:#6E5F54;\">\n          <div class=\"c14\"><span class=\"c0\"><\u002Fspan><div><span class=\"c7\">Bureau-validated risk capture<\u002Fspan> — eligibility, classification and form-triggering conditions surface against the loaded bureau content as the underwriter enters the risk<\u002Fdiv><\u002Fdiv>\n          <div class=\"c14\"><span class=\"c0\"><\u002Fspan><div><span class=\"c7\">Step-by-step rating trace<\u002Fspan> — every step in the bureau algorithm is visible, with carrier deviations flagged where they overlay the bureau base<\u002Fdiv><\u002Fdiv>\n          <div class=\"c14\"><span class=\"c0\"><\u002Fspan><div><span class=\"c7\">Bureau-driven form attachment<\u002Fspan> — every attached form has a bureau-defined reason; substitutions by the carrier are explicit and scoped<\u002Fdiv><\u002Fdiv>\n          <div class=\"c14\"><span class=\"c0\"><\u002Fspan><div><span class=\"c7\">Diff before re-rate<\u002Fspan> — any input change shows what moved (premium, edition, forms) before commit<\u002Fdiv><\u002Fdiv>\n          <div class=\"c14\"><span class=\"c0\"><\u002Fspan><div><span class=\"c7\">Regulator-ready bind record<\u002Fspan> — the bound policy carries its full form schedule, step-level trace and the exact content version it rated against<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"c15\">\n        <div class=\"c25\">WHAT THIS MEANS IN PRACTICE<\u002Fdiv>\n        <div class=\"c27\">\n          <div class=\"c2\"><span class=\"c12\">→<\u002Fspan><div><span class=\"c5\">Underwriters defend every premium they quote<\u002Fspan> — the math is visible, traceable and defensible at the desk<\u002Fdiv><\u002Fdiv>\n          <div class=\"c2\"><span class=\"c12\">→<\u002Fspan><div><span class=\"c5\">Compliance produces regulator-ready evidence in seconds<\u002Fspan> — what rated, what attached, what version, who approved<\u002Fdiv><\u002Fdiv>\n          <div class=\"c2\"><span class=\"c12\">→<\u002Fspan><div><span class=\"c5\">Every attached form has a reason traceable to a bureau rule<\u002Fspan> — agents and insureds get a defensible form list, not a black-box list<\u002Fdiv><\u002Fdiv>\n          <div class=\"c2\"><span class=\"c12\">→<\u002Fspan><div><span class=\"c5\">Input changes show what moves before commit<\u002Fspan> — no post-bind surprises, no reconciliation calls<\u002Fdiv><\u002Fdiv>\n          <div class=\"c2\"><span class=\"c12\">→<\u002Fspan><div><span class=\"c5\">Endorsements and renewals work from the same ground truth<\u002Fspan> — the bound policy stays tied to the exact content it rated against<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"c8\">\n      <span>FEDERATO · ISO ERC 2.0<\u002Fspan><span>PROTOTYPE WALKTHROUGH<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ══════════════════ ISO PERMISSIONS ══════════════════ -->\n  <section data-label=\"ISO Permissions\" data-speaker-notes=\"ISO Permissions is the contractual licensing gate that sits underneath everything you just saw. Every carrier signs an ISO Content Licensing Agreement with Verisk that scopes redistribution rights down to the line of business, the service (forms, loss costs, rules) and the jurisdiction. Today that scope lives in legal spreadsheets, disconnected from the engine — so the engine has no way to refuse content the carrier is not entitled to consume, and no way to stop surfacing bureau rates and forms when the agreement lapses. This screen brings the gate into the system: a master agreement record, a per-carrier matrix of 14 LOBs × 3 services × 53 jurisdictions, and a two-gate enforcement model where both the agreement and the cell must pass before any ISO content reaches a quote.\" class=\"c6\">\n    <div class=\"c22\">\n      <div>\n        <h2 class=\"c20\">ISO Permissions<\u002Fh2>\n      <\u002Fdiv>\n      <span class=\"c1\">LICENSING<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"c9\">\n      <div class=\"c19\">\n        <div class=\"c3\">BUILT FOR<\u002Fdiv>\n        <div class=\"c28\">\n          <div class=\"c2\"><span class=\"c13\">●<\u002Fspan>FDEs configuring the carrier's ISO Content Licensing Agreement with Verisk<\u002Fdiv>\n          <div class=\"c2\"><span class=\"c13\">●<\u002Fspan>Engineers onboarding a carrier and scoping its bureau content rights<\u002Fdiv>\n          <div class=\"c2\"><span class=\"c13\">●<\u002Fspan>Forms and actuarial teams when a cell goes dark and content disappears<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"c23\">\n        <div class=\"c3\">THE PROBLEM<\u002Fdiv>\n        <p class=\"c42\">ISO content is licensed, not free. Every carrier signs an ISO Content Licensing Agreement with Verisk that scopes redistribution rights to the LOB, the service and the state. Today that licensed scope lives in legal spreadsheets — the rating engine has no way to refuse content the carrier is not entitled to consume, and no way to stop surfacing bureau rates and forms when the agreement lapses. That is a contract risk the platform owes the customer to remove.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"c4\">\n        <div class=\"c24\">WHAT THE PROTOTYPE DOES<\u002Fdiv>\n        <div class=\"c32\">\n          <div class=\"c14\"><span class=\"c0\"><\u002Fspan><div><span class=\"c7\">ISO Content Licensing Agreement record<\u002Fspan> — in-place flag, as-of and expiration dates, uploaded agreement file, computed status badge per carrier<\u002Fdiv><\u002Fdiv>\n          <div class=\"c14\"><span class=\"c0\"><\u002Fspan><div><span class=\"c7\">Per-carrier 2,226-cell matrix<\u002Fspan> — 14 ISO LOBs × 3 services (forms, loss costs, rules) × 53 jurisdictions, every cell independently toggleable<\u002Fdiv><\u002Fdiv>\n          <div class=\"c14\"><span class=\"c0\"><\u002Fspan><div><span class=\"c7\">Sliced editor<\u002Fspan> — pick an LOB and a service, flip rights across all jurisdictions at once, instead of facing a wall of 2,226 cells<\u002Fdiv><\u002Fdiv>\n          <div class=\"c14\"><span class=\"c0\"><\u002Fspan><div><span class=\"c7\">Two-gate enforcement<\u002Fspan> — agreement gate AND matrix gate, both must pass for ISO content to surface anywhere in the app<\u002Fdiv><\u002Fdiv>\n          <div class=\"c14\"><span class=\"c0\"><\u002Fspan><div><span class=\"c7\">Draft, dirty and save<\u002Fspan> — stage a full set of changes before committing, with an explicit dirty indicator for FDE review<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"c15\">\n        <div class=\"c25\">WHAT THIS MEANS IN PRACTICE<\u002Fdiv>\n        <div class=\"c27\">\n          <div class=\"c2\"><span class=\"c12\">→<\u002Fspan><div><span class=\"c5\">The engine refuses content the carrier is not licensed to consume<\u002Fspan> — contract enforcement becomes systemic, not aspirational<\u002Fdiv><\u002Fdiv>\n          <div class=\"c2\"><span class=\"c12\">→<\u002Fspan><div><span class=\"c5\">An expired ISO Content Licensing Agreement stops bureau content at the gate<\u002Fspan> — no quietly issuing forms past the expiration date<\u002Fdiv><\u002Fdiv>\n          <div class=\"c2\"><span class=\"c12\">→<\u002Fspan><div><span class=\"c5\">FDEs see, in one place, exactly what every carrier is licensed for<\u002Fspan> — no more chasing legal spreadsheets<\u002Fdiv><\u002Fdiv>\n          <div class=\"c2\"><span class=\"c12\">→<\u002Fspan><div><span class=\"c5\">Adding a new licensed LOB is a UI action with an audit trail<\u002Fspan> — not a code change buried in Python<\u002Fdiv><\u002Fdiv>\n          <div class=\"c2\"><span class=\"c12\">→<\u002Fspan><div><span class=\"c5\">The same gate extends to every line<\u002Fspan> — the customer signs an amendment, the FDE flips the cells, the engine respects it<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"c8\">\n      <span>FEDERATO · ISO ERC 2.0<\u002Fspan><span>PROTOTYPE WALKTHROUGH<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ══════════════════ SCREEN 07 ══════════════════ -->\n  <section data-label=\"Circular Adoption\" data-speaker-notes=\"Circular adoption is a stretch goal for launch — the long-term capability for steady-state circular management once the core integration is in place. It replaces email threads and spreadsheets with a single queue: every pending ISO circular, a multi-role sign-off matrix, impact estimates and one-click bulk activation of approved ERC deliveries.\" class=\"c6\">\n    <div class=\"c22\">\n      <div>\n        <h2 class=\"c20\">Circular Adoption<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:10px;align-self:center;\">\n        <span class=\"c1\">CIRCULARS<\u002Fspan>\n        <span style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:0.1em;font-weight:600;color:#0a6b50;background:rgba(32,223,166,0.16);border:1px solid rgba(32,223,166,0.45);border-radius:999px;padding:8px 16px;\">STRETCH GOAL FOR LAUNCH<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"c9\">\n      <div style=\"background:#fff;border:1px solid #E5DCD0;border-radius:14px;padding:20px 26px;overflow:hidden;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:0.14em;color:#6E5F54;margin-bottom:12px;\">BUILT FOR<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:7px;font-size:16.5px;color:#3A2C24;line-height:1.26;\">\n          <div class=\"c2\"><span class=\"c13\">●<\u002Fspan>Product teams tracking incoming ISO circulars<\u002Fdiv>\n          <div class=\"c2\"><span class=\"c13\">●<\u002Fspan>Actuaries reviewing rate-impact estimates<\u002Fdiv>\n          <div class=\"c2\"><span class=\"c13\">●<\u002Fspan>Forms counsel reviewing new or revised language<\u002Fdiv>\n          <div class=\"c2\"><span class=\"c13\">●<\u002Fspan>Compliance &amp; PAS owners on deadlines and changes<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#EFE8DC;border-radius:14px;padding:20px 26px;overflow:hidden;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:0.14em;color:#6E5F54;margin-bottom:12px;\">THE PROBLEM<\u002Fdiv>\n        <p style=\"font-size:17.5px;line-height:1.44;color:#3A2C24;\">ISO releases dozens of GL circulars a year, each potentially changing rates, rules, forms or eligibility. A carrier must review each, estimate impact, decide to adopt, file with states and update the engine — against a regulatory deadline. Today this lives in email threads and spreadsheets, with no single view of pending changes, sign-offs and deadlines.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #E5DCD0;border-left:3px solid #20DFA6;border-radius:14px;padding:20px 26px 20px 24px;box-shadow:0 6px 22px -14px rgba(53,35,31,0.22);overflow:hidden;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:0.14em;color:#8A5634;font-weight:600;margin-bottom:11px;\">WHAT THE PROTOTYPE DOES<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:7px;font-size:16px;line-height:1.3;color:#6E5F54;\">\n          <div class=\"c2\"><span class=\"c30\"><\u002Fspan><div><span class=\"c7\">Single view of every pending circular<\u002Fspan> — title, scope, status, owner, target date<\u002Fdiv><\u002Fdiv>\n          <div class=\"c2\"><span class=\"c30\"><\u002Fspan><div><span class=\"c7\">Decision workflow<\u002Fspan> — circulars move through review, approval, adoption (with or without modifications), deferral or rejection<\u002Fdiv><\u002Fdiv>\n          <div class=\"c2\"><span class=\"c30\"><\u002Fspan><div><span class=\"c7\">Multi-role sign-off<\u002Fspan> — stakeholders across product, actuarial, forms, compliance, policy admin and executive sign off as required<\u002Fdiv><\u002Fdiv>\n          <div class=\"c2\"><span class=\"c30\"><\u002Fspan><div><span class=\"c7\">Bulk activation<\u002Fspan> — approved circulars and their underlying deliveries activate together<\u002Fdiv><\u002Fdiv>\n          <div class=\"c2\"><span class=\"c30\"><\u002Fspan><div><span class=\"c7\">Impact metrics<\u002Fspan> — premium impact, affected classes, estimated volume<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#EDE6DA;border:1px dashed #D8CBBA;border-radius:14px;padding:20px 26px;overflow:hidden;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:0.14em;color:#A2978C;margin-bottom:11px;\">WHAT THIS MEANS IN PRACTICE<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:7px;font-size:15.5px;line-height:1.3;color:#7C6E62;\">\n          <div class=\"c2\"><span class=\"c12\">→<\u002Fspan><div><span class=\"c5\">Product teams stop chasing email threads<\u002Fspan> — every circular has one home for its status, decisions and deadlines<\u002Fdiv><\u002Fdiv>\n          <div class=\"c2\"><span class=\"c12\">→<\u002Fspan><div><span class=\"c5\">Adoption decisions reach the right stakeholders<\u002Fspan> — without escalation chains or whispered handoffs<\u002Fdiv><\u002Fdiv>\n          <div class=\"c2\"><span class=\"c12\">→<\u002Fspan><div><span class=\"c5\">Financial impact is modeled against the actual in-force book<\u002Fspan> — not estimated on the back of an envelope<\u002Fdiv><\u002Fdiv>\n          <div class=\"c2\"><span class=\"c12\">→<\u002Fspan><div><span class=\"c5\">Filing deadlines never slip<\u002Fspan> — the timer is in the tool, not in someone's calendar<\u002Fdiv><\u002Fdiv>\n          <div class=\"c2\"><span class=\"c12\">→<\u002Fspan><div><span class=\"c5\">Adopting in some states and deferring in others<\u002Fspan> — becomes a structured workflow, not a hand-managed spreadsheet<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;justify-content:space-between;align-items:center;margin-top:14px;font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:0.12em;color:#B0A498;\">\n      <span>FEDERATO · ISO ERC 2.0<\u002Fspan><span>PROTOTYPE WALKTHROUGH<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ══════════════════ ERC DATA HIERARCHY ══════════════════ -->\n  <section data-label=\"ERC Data Hierarchy\" data-speaker-notes=\"The full content structure behind every rated risk. ISO ships one structured delivery per state per edition — sixty-plus CSVs and XMLs with built-in sample test cases for correctness validation. Nine ingest stages and three validation gates transform that raw content into a queryable library organized into three groups: rate tables, rules and forms, and the edition registry. Every premium calculation, form attachment, and audit record traces back to a specific row in this hierarchy.\" style=\"box-sizing:border-box;background:#35231F;color:#F2EADE;font-family:'Schibsted Grotesk',sans-serif;padding:56px 84px;display:flex;flex-direction:column;\">\n\n    <div style=\"display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px;\">\n      <div>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:14px;letter-spacing:0.18em;color:#20DFA6;font-weight:500;margin-bottom:10px;\">FROM BUREAU DELIVERY TO CONTENT LIBRARY<\u002Fdiv>\n        <h2 style=\"font-size:44px;font-weight:700;letter-spacing:-0.025em;line-height:1;\">ERC Data Hierarchy<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.12em;color:#A08B79;\">ONE DELIVERY · FULL TRACEABILITY<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- TIER 1: What ISO ships -->\n    <div style=\"background:rgba(242,234,222,0.05);border:1px solid rgba(242,234,222,0.14);border-radius:14px;padding:18px 24px;margin-bottom:14px;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:0.2em;color:#A08B79;margin-bottom:13px;\">ISO BUREAU DELIVERY — ONE FOLDER PER STATE × EDITION × DATE × VERSION<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:12px;\">\n        <div style=\"background:rgba(32,223,166,0.07);border:1px solid rgba(32,223,166,0.2);border-radius:10px;padding:14px 16px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.16em;color:#20DFA6;font-weight:600;margin-bottom:7px;\">RATE TABLES<\u002Fdiv>\n          <div style=\"font-size:21px;font-weight:700;margin-bottom:5px;\">60+ CSVs<\u002Fdiv>\n          <div style=\"font-size:13px;color:#A08B79;line-height:1.4;\">Loss costs · ILF factors · ELP · Claims-Made · TRIA · Deductibles · Territory maps<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:rgba(32,223,166,0.07);border:1px solid rgba(32,223,166,0.2);border-radius:10px;padding:14px 16px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.16em;color:#20DFA6;font-weight:600;margin-bottom:7px;\">RULES<\u002Fdiv>\n          <div style=\"font-size:21px;font-weight:700;margin-bottom:5px;\">2 XML files<\u002Fdiv>\n          <div style=\"font-size:13px;color:#A08B79;line-height:1.4;\">Rating algorithm orchestration · State GL rules · Form attachment logic<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:rgba(32,223,166,0.07);border:1px solid rgba(32,223,166,0.2);border-radius:10px;padding:14px 16px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.16em;color:#20DFA6;font-weight:600;margin-bottom:7px;\">FORM CONTENT<\u002Fdiv>\n          <div style=\"font-size:21px;font-weight:700;margin-bottom:5px;\">Form CSVs<\u002Fdiv>\n          <div style=\"font-size:13px;color:#A08B79;line-height:1.4;\">Form master · Field definitions · Domain tables · Ratebook lookups<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:rgba(32,223,166,0.07);border:1px solid rgba(32,223,166,0.2);border-radius:10px;padding:14px 16px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.16em;color:#20DFA6;font-weight:600;margin-bottom:7px;\">TEST CASES (STC)<\u002Fdiv>\n          <div style=\"font-size:21px;font-weight:700;margin-bottom:5px;\">5–10 JSONs<\u002Fdiv>\n          <div style=\"font-size:13px;color:#A08B79;line-height:1.4;\">Real GL quotes from ISO · End-to-end correctness check after every load<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- PIPELINE CONNECTOR -->\n    <div style=\"display:flex;align-items:center;gap:16px;margin:0 0 14px;\">\n      <div style=\"flex:1;height:1px;background:rgba(32,223,166,0.25);\"><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:10px;\">\n        <div style=\"width:6px;height:6px;border-radius:50%;background:#20DFA6;\"><\u002Fdiv>\n        <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.18em;color:#20DFA6;\">9-STAGE INGEST PIPELINE · 3 VALIDATION GATES<\u002Fspan>\n        <div style=\"width:6px;height:6px;border-radius:50%;background:#20DFA6;\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;height:1px;background:rgba(32,223,166,0.25);\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- TIER 2: Content library — 3 groups -->\n    <div style=\"flex:1;display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;min-height:0;\">\n\n      <!-- Group 1: Rate Content -->\n      <div style=\"background:rgba(242,234,222,0.04);border:1px solid rgba(242,234,222,0.1);border-radius:14px;padding:18px 20px;display:flex;flex-direction:column;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:0.2em;color:#20DFA6;font-weight:600;margin-bottom:14px;\">RATE CONTENT<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:11px;flex:1;\">\n          <div style=\"border-left:2px solid rgba(32,223,166,0.4);padding-left:12px;\">\n            <div style=\"font-size:16.5px;font-weight:600;margin-bottom:2px;\">Loss Costs<\u002Fdiv>\n            <div style=\"font-size:12.5px;color:#A08B79;line-height:1.35;\">Base premium per $100 of exposure · territory × class code · 2,000–5,000 rows per state<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"border-left:2px solid rgba(32,223,166,0.4);padding-left:12px;\">\n            <div style=\"font-size:16.5px;font-weight:600;margin-bottom:2px;\">Limit Factors<\u002Fdiv>\n            <div style=\"font-size:12.5px;color:#A08B79;line-height:1.35;\">ILF, ELP, Claims-Made, TRIA, Deductibles, Med Pay · 8,000–15,000 rows per state<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"border-left:2px solid rgba(32,223,166,0.4);padding-left:12px;\">\n            <div style=\"font-size:16.5px;font-weight:600;margin-bottom:2px;\">Class Assignments (ILTA)<\u002Fdiv>\n            <div style=\"font-size:12.5px;color:#A08B79;line-height:1.35;\">Every class code mapped to its ILF lookup table · 500–1,000 rows per state<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"border-left:2px solid rgba(32,223,166,0.4);padding-left:12px;\">\n            <div style=\"font-size:16.5px;font-weight:600;margin-bottom:2px;\">Territory Maps<\u002Fdiv>\n            <div style=\"font-size:12.5px;color:#A08B79;line-height:1.35;\">Zip code → territory crosswalk · 4,000–10,000 rows per state<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:14px;padding-top:11px;border-top:1px solid rgba(242,234,222,0.1);font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#6E5F54;letter-spacing:0.1em;\">POWERS → every premium calculation<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Group 2: Rules & Forms -->\n      <div style=\"background:rgba(242,234,222,0.04);border:1px solid rgba(242,234,222,0.1);border-radius:14px;padding:18px 20px;display:flex;flex-direction:column;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:0.2em;color:#20DFA6;font-weight:600;margin-bottom:14px;\">RULES &amp; FORMS<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:11px;flex:1;\">\n          <div style=\"border-left:2px solid rgba(32,223,166,0.4);padding-left:12px;\">\n            <div style=\"font-size:16.5px;font-weight:600;margin-bottom:2px;\">Algorithm Model<\u002Fdiv>\n            <div style=\"font-size:12.5px;color:#A08B79;line-height:1.35;\">Ordered rating step sequence decoded from ISO rules XML · 1 per delivery<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"border-left:2px solid rgba(32,223,166,0.4);padding-left:12px;\">\n            <div style=\"font-size:16.5px;font-weight:600;margin-bottom:2px;\">Form Master<\u002Fdiv>\n            <div style=\"font-size:12.5px;color:#A08B79;line-height:1.35;\">~2,000 forms per state · Mandatory / Conditional / Optional · attachment type per form<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"border-left:2px solid rgba(32,223,166,0.4);padding-left:12px;\">\n            <div style=\"font-size:16.5px;font-weight:600;margin-bottom:2px;\">Form Fields<\u002Fdiv>\n            <div style=\"font-size:12.5px;color:#A08B79;line-height:1.35;\">~50,000 field definitions · type, label, required flag, display rules per field<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"border-left:2px solid rgba(32,223,166,0.4);padding-left:12px;\">\n            <div style=\"font-size:16.5px;font-weight:600;margin-bottom:2px;\">Attachment Rules<\u002Fdiv>\n            <div style=\"font-size:12.5px;color:#A08B79;line-height:1.35;\">~50 conditions decoded from rules XML · when each form applies to a given risk<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:14px;padding-top:11px;border-top:1px solid rgba(242,234,222,0.1);font-family:'IBM Plex Mono',mo
